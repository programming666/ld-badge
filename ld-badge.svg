<svg xmlns="http://www.w3.org/2000/svg" width="200" height="28" viewBox="0 0 200 28">
  <rect width="200" height="28" rx="4" ry="4" fill="#f0f0f0"/>
  <!-- Logo -->
  <g transform="translate(4, 4)">
    <!-- 定义圆形裁剪路径 -->
    <defs>
      <clipPath id="logoClip">
        <circle cx="10" cy="10" r="9"/>
      </clipPath>
    </defs>
    <!-- 外圈灰色边框 -->
    <circle cx="10" cy="10" r="10" fill="#e8e8e8"/>
    <!-- 内部内容（被裁剪为圆形） -->
    <g clip-path="url(#logoClip)">
      <!-- 背景深灰色 -->
      <rect x="0" y="0" width="20" height="20" fill="#1a1a1a"/>
      <!-- 中间白色横条 -->
      <rect x="0" y="6" width="20" height="8" fill="#f5f5f5"/>
      <!-- 底部黄色横条 -->
      <rect x="0" y="14" width="20" height="6" fill="#ffb000"/>
    </g>
  </g>
  <text x="36" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="14" fill="#333333">致谢linux.do-新的理想型社区</text>
</svg>
