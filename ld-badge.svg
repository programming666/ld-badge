<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- 圆形裁剪路径 -->
    <clipPath id="logoClip">
      <circle cx="80" cy="100" r="70"/>
    </clipPath>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- 光晕效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="200" rx="16" ry="16" fill="url(#bgGradient)"/>
  
  <!-- 装饰性边框 -->
  <rect x="2" y="2" width="596" height="196" rx="14" ry="14" fill="none" stroke="#ffb000" stroke-width="2" opacity="0.6"/>
  
  <!-- 左侧大 Logo 区域 -->
  <g transform="translate(30, 0)">
    <!-- Logo 外发光 -->
    <circle cx="80" cy="100" r="72" fill="#ffb000" opacity="0.3" filter="url(#glow)"/>
    <circle cx="80" cy="100" r="70" fill="#f0f0f0"/>
    
    <!-- Logo 内容（被裁剪为圆形） -->
    <g clip-path="url(#logoClip)">
      <!-- 顶部黑色条（占30%） -->
      <rect x="10" y="30" width="140" height="42" fill="#1a1a1a"/>
      <!-- 中间白色横条（占40%） -->
      <rect x="10" y="72" width="140" height="56" fill="#f5f5f5"/>
      <!-- 底部黄色横条（占30%） -->
      <rect x="10" y="128" width="140" height="42" fill="#ffb000"/>
    </g>
    
    <!-- 底部网站名称 -->
    <text x="80" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffb000" text-anchor="middle">LINUX DO</text>
  </g>
  
  <!-- 分隔线 -->
  <line x1="200" y1="40" x2="200" y2="160" stroke="#ffb000" stroke-width="2" opacity="0.4"/>
  
  <!-- 右侧 OpenGraph 信息区域 -->
  <g transform="translate(220, 0)">
    <!-- 站点名称 -->
    <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">LINUX DO</text>
    
    <!-- 副标题/站点描述 -->
    <text x="0" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#a0a0a0">新的理想型社区</text>
    
    <!-- 口号/描述 -->
    <text x="0" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#ffb000" filter="url(#glow)">Where possible begins.</text>
    
    <!-- 装饰性信息标签 -->
    <g transform="translate(0, 145)">
      <rect x="0" y="0" width="120" height="28" rx="14" ry="14" fill="none" stroke="#ffb000" stroke-width="1.5" opacity="0.6"/>
      <text x="60" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#ffb000" text-anchor="middle">开源技术社区</text>
    </g>
    
    <g transform="translate(135, 145)">
      <rect x="0" y="0" width="100" height="28" rx="14" ry="14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
      <text x="50" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#ffffff" opacity="0.8" text-anchor="middle">真诚 · 友善</text>
    </g>
    
    <g transform="translate(250, 145)">
      <rect x="0" y="0" width="100" height="28" rx="14" ry="14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
      <text x="50" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#ffffff" opacity="0.8" text-anchor="middle">团结 · 专业</text>
    </g>
  </g>
</svg>
